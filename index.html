<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>惡意釣魚網站模擬器</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50; /* 深色背景製造駭客感 */
            color: #ecf0f1;
            text-align: center;
            padding: 20px;
        }
        .hacker-container {
            background-color: #34495e;
            border: 3px solid #e74c3c; /* 紅色警戒框 */
            border-radius: 10px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #e74c3c; }
        p.desc { font-size: 1.2em; margin-bottom: 20px; }
        
        /* 新增：輸入框與按鈕的樣式 */
        .input-group {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .input-group input[type="text"] {
            padding: 12px;
            width: 60%;
            border: 2px solid #7f8c8d;
            border-radius: 5px;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input[type="text"]:focus {
            border-color: #e74c3c; /* 聚焦時變紅色 */
        }
        .input-group button {
            padding: 12px 25px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .input-group button:hover {
            background-color: #c0392b;
        }

        /* 關鍵的 iframe 區域 */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            border: 5px dashed #f1c40f; /* 黃色虛線框 */
            background: #fff; /* 白色背景，如果被擋住時會顯示 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* 這裡模擬點擊劫持的關鍵：駭客可以把你的網站變透明，疊在假按鈕上 */
            /* opacity: 0.5; 我們先不變透明，讓客戶看清楚被嵌進去 */
        }
        
        /* 模擬的惡意覆蓋層 (示意用) */
        .malicious-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 讓點擊穿透到 iframe */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: rgba(231, 76, 60, 0.3);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hacker-container">
        <h1>⚠️ 警告：這是一個模擬的惡意網站</h1>
        <p class="desc">
            駭客正試圖將您的網站嵌入到這裡進行「點擊劫持 (Clickjacking)」攻擊。<br>
            請在下方輸入您想測試的網址，並觀察黃色虛線框內的變化。
        </p>

        <div class="input-group">
            <input type="text" id="customUrlInput" placeholder="輸入要測試的網址 (例如: https://example.com)" value="https://請自行輸入更換">
            <button id="testBtn">載入目標網站</button>
        </div>

        <div class="iframe-wrapper">
            <iframe id="targetFrame" src="https://請自行輸入更換"></iframe>
            <div class="malicious-overlay">
                (駭客的透明圖層會疊在這裡)
            </div>
        </div>

        <p style="margin-top: 20px; color: #bdc3c7;">
            如果您的網站完整顯示在上面，代表您<span style="color:#e74c3c; font-weight:bold;">容易受攻擊</span>。<br>
            如果顯示空白或拒絕連線，代表<span style="color:#2ecc71; font-weight:bold;">安全防護 (X-Frame-Options 或 CSP) 已啟動</span>。
        </p>
    </div>

    <script>
        const testBtn = document.getElementById('testBtn');
        const urlInput = document.getElementById('customUrlInput');
        const iframe = document.getElementById('targetFrame');

        // 核心載入函數
        function loadTargetUrl() {
            let url = urlInput.value.trim();
            if (url) {
                // 如果使用者忘記打 http 或 https，自動幫忙補上 https://
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                    urlInput.value = url; // 同步更新輸入框顯示
                }
                iframe.src = url;
            }
        }

        // 綁定按鈕點擊事件
        testBtn.addEventListener('click', loadTargetUrl);

        // 綁定輸入框 Enter 鍵事件，提升使用者體驗
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadTargetUrl();
            }
        });

        // 保留原本的 URL 參數功能 (?url=...)
        // 如果網址帶有參數，優先使用參數並同步更新到輸入框
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');
        if (targetUrl) {
            iframe.src = targetUrl;
            urlInput.value = targetUrl;
        }
    </script>
</body>
</html>
