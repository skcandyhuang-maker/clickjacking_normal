<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>惡意釣魚網站模擬器</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50; /* 深色背景製造駭客感 */
            color: #ecf0f1;
            text-align: center;
            padding: 20px;
        }
        .hacker-container {
            background-color: #34495e;
            border: 3px solid #e74c3c; /* 紅色警戒框 */
            border-radius: 10px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #e74c3c; }
        p.desc { font-size: 1.2em; margin-bottom: 30px; }
        
        /* 關鍵的 iframe 區域 */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            border: 5px dashed #f1c40f; /* 黃色虛線框 */
            background: #fff; /* 白色背景，如果被擋住時會顯示 */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* 這裡模擬點擊劫持的關鍵：駭客可以把你的網站變透明，疊在假按鈕上 */
            /* opacity: 0.5; 我們先不變透明，讓客戶看清楚被嵌進去 */
        }
        
        /* 模擬的惡意覆蓋層 (示意用) */
        .malicious-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* 讓點擊穿透到 iframe */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            color: rgba(231, 76, 60, 0.3);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="hacker-container">
        <h1>⚠️ 警告：這是一個模擬的惡意網站</h1>
        <p class="desc">
            駭客正試圖將您的網站嵌入到這裡進行「點擊劫持 (Clickjacking)」攻擊。<br>
            請觀察下方的黃色框框。
        </p>

        <div class="iframe-wrapper">
            <iframe id="targetFrame" src="https://yes.skcpoc.com"></iframe>
            <div class="malicious-overlay">
                (駭客的透明圖層會疊在這裡)
            </div>
        </div>

        <p style="margin-top: 20px; color: #bdc3c7;">
            如果您的網站完整顯示在上面，代表您<span style="color:#e74c3c; font-weight:bold;">容易受攻擊</span>。<br>
            如果顯示空白或拒絕連線，代表<span style="color:#2ecc71; font-weight:bold;">安全防護已啟動</span>。
        </p>
    </div>

    <script>
        // 這個腳本只是為了方便你切換網址演示，你可以手動改 HTML，也可以用這個
        // 用法：在瀏覽器網址列後面加 ?url=你要測試的網址
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');
        if (targetUrl) {
            document.getElementById('targetFrame').src = targetUrl;
        }
    </script>
</body>
</html>
